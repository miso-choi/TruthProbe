dataset_path: /root/Desktop/workspace/miso/hub/datasets/lavis/halueval 
dataset_name: null
dataset_kwargs:
  data_files: {"default": "annotations/annotations_answer3.jsonl"}
  # data_files: "final_target_.jsonl"
  token: True
task: "halueval_answer3"
test_split: default 
output_type: generate_until
# doc_to_visual: !function utils.halueval_doc_to_visual
doc_to_text: !function utils.halueval_doc_to_text
doc_to_target: "answer"
generation_kwargs:
  max_new_tokens: 7
  temperature: 0
  top_p: 0
  num_beams: 1
  do_sample: false
process_results: !function utils.halueval_process_results
metric_list:
  - metric: halueval_accuracy
    aggregation: !function utils.halueval_aggregate_accuracy
    higher_is_better: true
  - metric: halueval_precision
    aggregation: !function utils.halueval_aggregate_precision
    higher_is_better: true
  - metric: halueval_recall
    aggregation: !function utils.halueval_aggregate_recall
    higher_is_better: true
  - metric: halueval_f1_score
    aggregation: !function utils.halueval_aggregate_f1_score
    higher_is_better: true
  - metric: halueval_yes_ratio
    aggregation: !function utils.halueval_aggregate_yes_ratio
    higher_is_better: true

lmms_eval_specific_kwargs:
  default:
    pre_prompt: "You are a huallucination detector. You MUST determine if the provided answer contains hallucination or not for the question based on the world knowledge. The answer you provided MUST be Yes or No."
    post_prompt: ""
  plm:
    pre_prompt: ""
    post_prompt: ""
metadata:
  version: 0.0
  use_instruction: false
  use_knowledge: false
  