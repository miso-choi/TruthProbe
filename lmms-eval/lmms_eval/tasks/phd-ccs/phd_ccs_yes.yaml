# configs/tasks/phd_ccs_yes.yaml
dataset_path: /root/Desktop/workspace/seonga/datasets/Phd_ccs/data_ccs
dataset_name: null
dataset_kwargs:
  # dataset_path를 기준으로 상대경로 지정 (절대경로도 가능)
  data_files: {"yes": "phd_ccs_yes.jsonl"}
  # 로컬이므로 토큰 불필요
  token: false

task: "phd_ccs_yes"
test_split: "yes"
output_type: generate_until

# 어댑터 (utils.py에 구현되어 있어야 함)
doc_to_visual: !function utils.phd_doc_to_visual
doc_to_text:   !function utils.phd_doc_to_text
doc_to_target: "answer"

# 생성 하이퍼파라미터
generation_kwargs:
  max_new_tokens: 64
  temperature: 0
  top_p: null        # ← 0은 비권장. 필요 없으면 null 또는 제거
  num_beams: 1
  do_sample: false

# 결과 처리 & 메트릭 집계
process_results: !function utils.phd_process_results
metric_list:
  - metric: phd_ccs_accuracy     # utils.phd_process_results 가 반환하는 스칼라 키
    aggregation: mean
    higher_is_better: true

# (옵션) 프롬프트 보조
lmms_eval_specific_kwargs:
  default:
    pre_prompt: "A chat between a curious human and an artificial intelligence assistant. The assistant gives helpful, detailed, and polite answers to the human’s question.\n"
    post_prompt: ""
  plm:
    pre_prompt: "A chat between a curious human and an artificial intelligence assistant. The assistant gives helpful, detailed, and polite answers to the human’s question.\n"
    post_prompt: ""

# 메타데이터(원하면 자유롭게)
metadata:
  version: 0.0
