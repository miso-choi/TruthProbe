dataset_path: /root/Desktop/workspace/miso/hub/datasets/lavis/coco
dataset_name: null
dataset_kwargs:
  data_files: {"default": "chair_annotations/annotations_coco_500.jsonl"}
  # data_files: "final_target_.jsonl"
  token: True
task: "chair_max512"
test_split: default 
output_type: generate_until
##여기를 고쳐야합니다
process_docs: !function utils.process_docs
doc_to_visual: !function utils.chair_doc_to_visual
doc_to_text: !function utils.chair_doc_to_text
doc_to_target: !function utils.chair_doc_to_target
generation_kwargs:
  max_new_tokens: 512
  temperature: 0
  top_p: 0
  num_beams: 1
  do_sample: false
process_results: !function utils.chair_process_results
metric_list:
  - metric: CHAIRs
    aggregation: !function utils.chair_agg_chairs
    higher_is_better: false
  - metric: CHAIRi
    aggregation: !function utils.chair_agg_chairi
    higher_is_better: false
  #- metric: PING
  #  aggregation: !function utils.ping_metric
  #  higher_is_better: true

lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    post_prompt: ""
  plm:
    pre_prompt: ""
    post_prompt: ""
metadata:
  version: 0.0
  no_system_prompt: false