# Math test split only. **No public labels** — there is no test accuracy in lmms-eval;
# the ``submission`` metric is the **count** of predictions written to ``mmmu_test_for_submission.json``
# (or use ``mmmu_val_math`` when you need a numeric accuracy).
dataset_path: lmms-lab/MMMU
task: "mmmu_test_math"
test_split: test
output_type: generate_until
process_docs: !function utils.process_docs_mmmu_math
doc_to_visual: !function utils.mmmu_doc_to_visual
doc_to_text: !function utils.mmmu_doc_to_text
doc_to_target: "answer"
process_results: !function utils.mmmu_process_results

generation_kwargs:
  max_new_tokens: 512

metric_list:
  - metric: submission
    aggregation: !function utils.mmmu_test_aggregate_results_for_submission
    higher_is_better: true

lmms_eval_specific_kwargs:
  default:
    prompt_type: "format"
    multiple_choice_prompt: "Answer with the option's letter from the given choices directly."
    open_ended_prompt: "Answer the question using a single word or phrase."

include: _default_template_yaml
