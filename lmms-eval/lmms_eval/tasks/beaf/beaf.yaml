dataset_path: /root/Desktop/workspace/miso/hub/datasets/lavis/beaf
dataset_name: null
dataset_kwargs:
  data_files: {"default": "annotations/beaf_qna.jsonl"}
  token: True
task: "beaf"
test_split: default
output_type: generate_until
doc_to_visual: !function utils.beaf_doc_to_visual
doc_to_text: !function utils.beaf_doc_to_text
doc_to_target: "answer"
generation_kwargs:
  max_new_tokens: 5
  temperature: 0
  top_p: 1.0
  num_beams: 1
  do_sample: false
process_results: !function utils.beaf_process_results
metric_list:
  - metric: beaf_accuracy
    aggregation: !function utils.beaf_aggregate_accuracy
    higher_is_better: true
  - metric: beaf_precision
    aggregation: !function utils.beaf_aggregate_precision
    higher_is_better: true
  - metric: beaf_recall
    aggregation: !function utils.beaf_aggregate_recall
    higher_is_better: true
  - metric: beaf_f1_score
    aggregation: !function utils.beaf_aggregate_f1_score
    higher_is_better: true
  - metric: beaf_faithfulness_metrics
    aggregation: !function utils.beaf_aggregate_faithfulness_metrics
    higher_is_better: true # SHOULD BE CHECKED
lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    post_prompt: "\nAnswer the question using a single word or phrase."
  plm:
    pre_prompt: ""
    post_prompt: "\nYour response must be concise."
metadata:
  version: 0.0